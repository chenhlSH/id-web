<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能机器人中控平台</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --wall: #cbd5e1;
            --floor: #1e293b;
            --furniture: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; }
        body { background: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* --- 左侧控制台 --- */
        .console {
            width: 340px; min-width: 340px;
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            border-right: 1px solid var(--border);
            padding: 32px 24px;
            display: flex; flex-direction: column; gap: 28px;
            z-index: 100;
        }

        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .brand-icon { width: 36px; height: 36px; background: var(--primary); border-radius: 10px; display: grid; place-items: center; font-size: 18px; }
        .brand h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }

        .status-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px; display: flex; align-items: center; gap: 14px;
        }
        .status-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); }
        .status-info h3 { font-size: 14px; font-weight: 600; }
        .status-info p { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

        .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-sub); font-weight: 700; }

        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .nav-btn {
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            color: var(--text-main); padding: 14px 12px; border-radius: 12px;
            cursor: pointer; transition: all 0.2s; font-size: 13px; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
        .nav-btn.active { background: rgba(59,130,246,0.15); border-color: var(--primary); color: var(--primary); }

        .action-area { margin-top: auto; display: flex; flex-direction: column; gap: 12px; }
        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; box-shadow: 0 4px 20px var(--primary-glow); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--primary-glow); }

        .btn-voice { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-main); }
        .btn-voice.listening { background: rgba(239,68,68,0.12); border-color: #ef4444; color: #ef4444; animation: voicePulse 1.5s infinite; }

        .voice-hint { font-size: 12px; color: var(--text-sub); text-align: center; min-height: 18px; }

        @keyframes voicePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.3); } 50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } }

        /* --- 右侧地图区 --- */
        .map-container {
            flex: 1; position: relative; overflow: hidden;
            background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 24px 24px;
            display: flex; align-items: center; justify-content: center;
        }

        svg.floor-plan { width: 90%; height: 90%; max-width: 960px; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4)); }
        .wall { fill: none; stroke: var(--wall); stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
        .room { fill: var(--floor); stroke: none; transition: fill 0.3s; cursor: crosshair; }
        .room:hover { fill: #27354d; }
        .furniture { fill: var(--furniture); opacity: 0.6; pointer-events: none; }
        .room-label { fill: var(--text-sub); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-anchor: middle; dominant-baseline: middle; pointer-events: none; opacity: 0.5; }

        /* 我的位置标记 - 使用SVG内嵌，跟随坐标系 */
        .my-location-group { pointer-events: none; }
        .my-dot { fill: var(--accent); stroke: #fff; stroke-width: 3; filter: drop-shadow(0 0 6px var(--accent)); }
        .my-ring { fill: none; stroke: var(--accent); stroke-width: 2; transform-origin: center; animation: myPing 2s ease-out infinite; }
        .my-label-text { fill: var(--accent); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-anchor: middle; }
        @keyframes myPing { 0% { r: 8; opacity: 0.8; } 100% { r: 30; opacity: 0; } }

        /* 机器人 - 使用SVG内嵌，跟随坐标系 */
        .robot-group { transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1); pointer-events: none; }
        .robot-body { fill: var(--primary); stroke: #fff; stroke-width: 3; filter: drop-shadow(0 0 10px var(--primary-glow)); }
        .robot-icon { font-size: 18px; text-anchor: middle; dominant-baseline: central; }
        .robot-dir { fill: #fff; }

        /* 目标点 */
        .target-group { pointer-events: none; opacity: 0; transition: opacity 0.3s; }
        .target-ring { fill: none; stroke: var(--primary); stroke-width: 2; transform-origin: center; animation: targetRipple 0.8s ease-out infinite; }
        .target-ring-delay { animation-delay: 0.4s; }
        @keyframes targetRipple { 0% { r: 4; opacity: 1; } 100% { r: 28; opacity: 0; } }

        /* 坐标显示 */
        .coords-overlay {
            position: absolute; bottom: 20px; right: 24px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            padding: 8px 16px; border-radius: 8px; font-family: 'Courier New', monospace;
            font-size: 12px; color: var(--text-sub); border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <!-- 左侧控制台 -->
    <aside class="console">
        <div class="brand">
            <div class="brand-icon">🤖</div>
            <h1>Robot Console</h1>
        </div>

        <div class="status-card">
            <div class="status-dot"></div>
            <div class="status-info">
                <h3>系统在线</h3>
                <p id="batteryLevel">电量 87% · 信号良好</p>
            </div>
        </div>

        <div>
            <div class="section-label" style="margin-bottom:12px;">快捷导航</div>
            <div class="nav-grid">
                <button class="nav-btn" data-room="living" onclick="navigateTo('living')">🛋️ 客厅</button>
                <button class="nav-btn" data-room="kitchen" onclick="navigateTo('kitchen')">🍳 厨房</button>
                <button class="nav-btn" data-room="bedroom" onclick="navigateTo('bedroom')">🛏️ 主卧</button>
                <button class="nav-btn" data-room="study" onclick="navigateTo('study')">📚 书房</button>
            </div>
        </div>

        <div class="action-area">
            <div class="voice-hint" id="voiceHint">点击开启语音指令</div>
            <button class="btn btn-voice" id="voiceBtn" onclick="toggleVoice()">🎙️ 语音控制</button>
            <button class="btn btn-primary" onclick="comeToMe()">📍 到我身边</button>
        </div>
    </aside>

    <!-- 右侧地图 -->
    <main class="map-container" id="mapContainer">
        <svg class="floor-plan" id="floorPlan" viewBox="0 0 800 600">
            <!-- 房间区域 -->
            <rect class="room" x="40" y="40" width="320" height="260" rx="4" data-room="living"/>
            <rect class="room" x="360" y="40" width="200" height="200" rx="4" data-room="kitchen"/>
            <rect class="room" x="560" y="40" width="200" height="280" rx="4" data-room="bedroom"/>
            <rect class="room" x="360" y="300" width="200" height="260" rx="4" data-room="study"/>
            <rect class="room" x="40" y="300" width="320" height="260" rx="4" data-room="dining"/>

            <!-- 家具示意 -->
            <rect class="furniture" x="60" y="80" width="120" height="40" rx="6"/>
            <rect class="furniture" x="60" y="120" width="40" height="80" rx="6"/>
            <rect class="furniture" x="120" y="150" width="80" height="50" rx="4"/>
            <rect class="furniture" x="370" y="50" width="180" height="30" rx="3"/>
            <rect class="furniture" x="370" y="50" width="30" height="120" rx="3"/>
            <rect class="furniture" x="600" y="80" width="120" height="180" rx="8"/>
            <rect class="furniture" x="610" y="60" width="100" height="20" rx="4"/>
            <rect class="furniture" x="380" y="320" width="160" height="50" rx="4"/>
            <ellipse class="furniture" cx="200" cy="430" rx="70" ry="45"/>

            <!-- 墙体 -->
            <path class="wall" d="M40,40 H760 V560 H40 Z"/>
            <line class="wall" x1="360" y1="40" x2="360" y2="560"/>
            <line class="wall" x1="560" y1="40" x2="560" y2="320"/>
            <line class="wall" x1="360" y1="300" x2="560" y2="300"/>
            <line class="wall" x1="40" y1="300" x2="360" y2="300"/>

            <!-- 门洞 -->
            <rect x="355" y="180" width="10" height="50" fill="var(--bg-dark)"/>
            <rect x="355" y="380" width="10" height="50" fill="var(--bg-dark)"/>
            <rect x="555" y="180" width="10" height="50" fill="var(--bg-dark)"/>
            <rect x="180" y="295" width="60" height="10" fill="var(--bg-dark)"/>

            <!-- 房间标签 -->
            <text x="200" y="200" class="room-label">LIVING</text>
            <text x="460" y="150" class="room-label">KITCHEN</text>
            <text x="660" y="200" class="room-label">BEDROOM</text>
            <text x="460" y="440" class="room-label">STUDY</text>
            <text x="200" y="430" class="room-label">DINING</text>

            <!-- ★ 我的位置 -->
            <g class="my-location-group" transform="translate(180, 220)">
                <circle class="my-ring" cx="0" cy="0" r="8"/>
                <circle class="my-dot" cx="0" cy="0" r="8"/>
                <text class="my-label-text" x="0" y="-20">MY LOCATION</text>
            </g>

            <!-- ★ 目标点标记 -->
            <g class="target-group" id="targetGroup">
                <circle class="target-ring" cx="0" cy="0" r="4"/>
                <circle class="target-ring target-ring-delay" cx="0" cy="0" r="4"/>
            </g>

            <!-- ★ 机器人（SVG内嵌，坐标统一） -->
            <g class="robot-group" id="robotGroup" transform="translate(240, 180)">
                <circle class="robot-body" cx="0" cy="0" r="20"/>
                <polygon class="robot-dir" points="-5,-24 5,-24 0,-32"/>
                <text class="robot-icon" x="0" y="1">🤖</text>
            </g>
        </svg>

        <div class="coords-overlay" id="coordsDisplay">X: 240 &nbsp; Y: 180</div>
    </main>

<script>
    // ========== SVG 坐标系配置（viewBox: 0 0 800 600） ==========
    const ROOM_POSITIONS = {
        living:   { x: 200, y: 170 },
        kitchen:  { x: 460, y: 140 },
        bedroom:  { x: 660, y: 180 },
        study:    { x: 460, y: 430 },
        dining:   { x: 200, y: 430 }
    };
    // "我的位置"在客厅沙发旁，不再居中
    const MY_POSITION = { x: 180, y: 220 };

    // ========== DOM ==========
    const svg         = document.getElementById('floorPlan');
    const robotGroup  = document.getElementById('robotGroup');
    const targetGroup = document.getElementById('targetGroup');
    const coordsDisplay = document.getElementById('coordsDisplay');
    const voiceBtn    = document.getElementById('voiceBtn');
    const voiceHint   = document.getElementById('voiceHint');
    const navBtns     = document.querySelectorAll('.nav-btn');

    let currentX = 240, currentY = 180;
    let targetTimeout = null;

    // ========== 核心移动函数（SVG坐标系） ==========
    function moveRobotTo(x, y, label) {
        // 钳制在viewBox范围内
        x = Math.max(40, Math.min(760, x));
        y = Math.max(40, Math.min(560, y));
        currentX = x;
        currentY = y;

        // 移动机器人（SVG transform）
        robotGroup.setAttribute('transform', `translate(${x}, ${y})`);

        // 目标点动画
        targetGroup.setAttribute('transform', `translate(${x}, ${y})`);
        targetGroup.style.opacity = '1';
        if (targetTimeout) clearTimeout(targetTimeout);
        targetTimeout = setTimeout(() => { targetGroup.style.opacity = '0'; }, 900);

        // 更新坐标显示
        coordsDisplay.innerHTML = `X: ${Math.round(x)} &nbsp; Y: ${Math.round(y)}${label ? ' &nbsp;→&nbsp; ' + label : ''}`;

        // 高亮导航按钮
        navBtns.forEach(b => b.classList.remove('active'));
        if (label) {
            const btn = document.querySelector(`.nav-btn[data-room="${label.toLowerCase()}"]`);
            if (btn) btn.classList.add('active');
        }
    }

    // ========== 导航 ==========
    function navigateTo(room) {
        const pos = ROOM_POSITIONS[room];
        if (!pos) return;
        moveRobotTo(pos.x, pos.y, room.toUpperCase());
        speak(`正在前往${getRoomCN(room)}`);
    }

    function comeToMe() {
        moveRobotTo(MY_POSITION.x, MY_POSITION.y, 'MY LOCATION');
        speak('好的，我马上来到您身边');
    }

    function getRoomCN(key) {
        const map = { living:'客厅', kitchen:'厨房', bedroom:'主卧', study:'书房', dining:'餐厅' };
        return map[key] || key;
    }

    // ========== 点击地图（SVG坐标反向映射，缩放无误差） ==========
    svg.addEventListener('click', e => {
        // 通过 getScreenCTM 逆矩阵将屏幕坐标转为SVG坐标
        const pt = svg.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const ctm = svg.getScreenCTM();
        if (!ctm) return;
        const svgPt = pt.matrixTransform(ctm.inverse());
        moveRobotTo(svgPt.x, svgPt.y, '');
    });

    // ========== 语音控制 ==========
    let recognition = null, isListening = false;

    function toggleVoice() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            alert('请使用 Chrome / Edge 浏览器以支持语音识别');
            return;
        }
        isListening ? stopVoice() : startVoice();
    }

    function startVoice() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SR();
        recognition.lang = 'zh-CN';
        recognition.continuous = true;
        recognition.interimResults = false;

        recognition.onstart = () => {
            isListening = true;
            voiceBtn.classList.add('listening');
            voiceHint.textContent = '🔴 正在聆听…';
        };
        recognition.onresult = e => {
            const cmd = e.results[e.results.length-1][0].transcript.trim();
            voiceHint.textContent = `识别: "${cmd}"`;
            parseCommand(cmd);
        };
        recognition.onerror = () => stopVoice();
        recognition.onend   = () => { if (isListening) recognition.start(); };
        recognition.start();
    }

    function stopVoice() {
        isListening = false;
        if (recognition) recognition.stop();
        voiceBtn.classList.remove('listening');
        voiceHint.textContent = '点击开启语音指令';
    }

    function parseCommand(cmd) {
        if (/身边|过来|回来|找我/.test(cmd))      comeToMe();
        else if (/客厅/.test(cmd))                 navigateTo('living');
        else if (/厨房/.test(cmd))                 navigateTo('kitchen');
        else if (/卧室|主卧/.test(cmd))             navigateTo('bedroom');
        else if (/书房/.test(cmd))                 navigateTo('study');
        else if (/餐厅/.test(cmd))                 navigateTo('dining');
        else speak('未识别到有效指令，请重试');
    }

    function speak(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN'; u.rate = 1.1;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
    }

    // 初始化
    moveRobotTo(240, 180, '');
</script>
</body>
</html>
