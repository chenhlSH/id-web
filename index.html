<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>母亲节快乐 · 康乃馨</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: radial-gradient(circle at center, #fce4ec 0%, #f8bbd0 40%, #f48fb1 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", "苹方", "华文楷体", "KaiTi", cursive, sans-serif;
      overflow: hidden;
      position: relative;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .blessing {
      position: absolute;
      z-index: 2;
      bottom: 18%;
      text-align: center;
      color: #d81b60;
      text-shadow: 2px 2px 8px rgba(255,255,255,0.7);
      opacity: 0;
      transition: opacity 3s ease;
      pointer-events: none;
    }
    .blessing.show {
      opacity: 1;
    }
    .blessing h1 {
      font-size: clamp(2.5rem, 10vw, 4.5rem);
      font-weight: 500;
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }
    .blessing p {
      font-size: clamp(1rem, 3.5vw, 1.5rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #ad1457;
    }
  </style>
</head>
<body>
  <canvas id="flowerCanvas"></canvas>
  <div class="blessing" id="blessing">
    <h1>母亲节快乐</h1>
    <p>结果我还是在路上抽空做了</p>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('flowerCanvas');
      const ctx = canvas.getContext('2d');
      const blessing = document.getElementById('blessing');

      let width, height, centerX, centerY;
      let animationStart = null;
      const bloomDuration = 2800; // 盛开动画持续时间(ms)
      const totalDuration = 4500; // 完全展示后文字出现的时间(ms)
      let petals = []; // 飘落花瓣数组
      const maxPetals = 35;

      // ---------- 自适应尺寸 ----------
      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        centerX = width * 0.5;
        centerY = height * 0.45; // 花朵中心偏上，给文字留空
      }
      window.addEventListener('resize', resize);
      resize();

      // ---------- 花瓣飘落粒子 ----------
      function createPetal() {
        const angle = Math.random() * Math.PI * 2;
        const distance = Math.random() * 120 + 30;
        return {
          x: centerX + Math.cos(angle) * distance,
          y: centerY + Math.sin(angle) * distance - 30,
          vx: (Math.random() - 0.5) * 1.2,
          vy: Math.random() * 1.5 + 0.5,
          size: Math.random() * 35 + 20,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.05,
          opacity: Math.random() * 0.7 + 0.3,
          color: `rgba(255, ${100 + Math.floor(Math.random() * 80)}, ${130 + Math.floor(Math.random() * 70)}, `,
          delay: Math.random() * 1000, // 随机启动延迟
        };
      }

      // 初始化花瓣池
      function initPetals(count) {
        petals = [];
        for (let i = 0; i < count; i++) {
          const p = createPetal();
          p.y = centerY - 20 - Math.random() * 80; // 从花朵附近开始
          petals.push(p);
        }
      }
      initPetals(maxPetals);

      // 更新花瓣
      function updatePetals(elapsed) {
        for (let p of petals) {
          if (elapsed < p.delay) continue; // 延迟出现
          p.x += p.vx;
          p.y += p.vy;
          p.rotation += p.rotSpeed;
          // 边界重置：飘出画面或太远则重新生成
          if (p.y > height + 50 || p.x < -80 || p.x > width + 80 || p.y < -100) {
            Object.assign(p, createPetal());
            p.y = centerY - 30;
            p.x = centerX + (Math.random() - 0.5) * 100;
          }
        }
      }

      // 绘制单个飘落花瓣形状（心形 / 康乃馨花瓣简化）
      function drawFloatingPetal(ctx, x, y, size, rotation, opacity, colorBase) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.globalAlpha = opacity;
        // 用两个椭圆组成心形花瓣
        ctx.beginPath();
        const s = size * 0.5;
        ctx.ellipse(-s * 0.45, -s * 0.25, s * 0.4, s * 0.8, -0.4, 0, Math.PI * 2);
        ctx.ellipse(s * 0.45, -s * 0.25, s * 0.4, s * 0.8, 0.4, 0, Math.PI * 2);
        ctx.fillStyle = colorBase + opacity + ')';
        ctx.fill();
        ctx.restore();
      }

      // ---------- 绘制康乃馨（多层锯齿花瓣） ----------
      function drawCarnation(bloomProgress) {
        // bloomProgress: 0 花苞 -> 1 完全盛开
        const layers = 6;          // 花瓣层数
        const petalsPerLayer = 12; // 每层花瓣数
        const baseRadius = Math.min(width, height) * 0.18;
        const maxScale = 1.0;
        // 花苞时花瓣极度内收，radiusFactor 从0.2变到1.0
        const radiusFactor = 0.2 + bloomProgress * 0.8;
        const scaleFactor = 0.3 + bloomProgress * 0.7; // 花瓣大小缩放

        ctx.save();
        ctx.translate(centerX, centerY);

        // 逐层绘制，外层先画，内层后画（形成层叠效果）
        for (let l = layers; l >= 0; l--) {
          const layerProgress = l / layers; // 0(中心) ~ 1(最外层)
          // 该层半径：花苞时所有层挤在一起，盛开时外扩
          const layerRadius = baseRadius * (0.35 + layerProgress * 1.2) * radiusFactor;
          // 内层颜色深，外层颜色浅
          const redBase = 210 + Math.floor(layerProgress * 45);
          const greenBase = 30 + Math.floor(layerProgress * 40);
          const blueBase = 60 + Math.floor(layerProgress * 40);
          const colorInner = `rgb(${redBase}, ${greenBase}, ${blueBase})`;
          const colorOuter = `rgb(${redBase + 30}, ${greenBase + 30}, ${blueBase + 40})`;

          // 每层花瓣绕圈分布
          const petalsCount = petalsPerLayer - l * 2; // 外层花瓣少一点，内层密集
          const angleStep = (Math.PI * 2) / petalsCount;

          for (let i = 0; i < petalsCount; i++) {
            const angle = i * angleStep + (l * 0.25); // 每层错开角度
            const x = Math.cos(angle) * layerRadius;
            const y = Math.sin(angle) * layerRadius;

            ctx.save();
            ctx.translate(x, y);
            // 花瓣朝外倾斜
            ctx.rotate(angle + Math.PI / 2 + (Math.random() - 0.5) * 0.2 * bloomProgress);

            // 花瓣大小：内层小，外层大，并随 bloom 缩放
            const petalLength = baseRadius * (0.45 + layerProgress * 0.7) * scaleFactor * (0.8 + Math.random() * 0.4);
            const petalWidth = petalLength * (0.35 + Math.random() * 0.2);

            // 绘制锯齿花瓣（用多个椭圆/波浪边模拟）
            ctx.beginPath();
            // 使用三次贝塞尔曲线画一个带波浪边的水滴形
            const waveCount = 5;
            const stepAngle = Math.PI / (waveCount + 1);
            // 左侧波浪
            ctx.moveTo(0, -petalLength * 0.15); // 花心连接处
            for (let w = 0; w <= waveCount; w++) {
              const t = w / waveCount;
              const px = -Math.sin(t * Math.PI) * petalWidth * (1 - t * 0.5);
              const py = -petalLength * 0.2 - t * petalLength * 0.8;
              // 波浪偏移
              const waveOffset = Math.sin(t * Math.PI * 2) * petalWidth * 0.25 * (1 - t);
              ctx.lineTo(px + waveOffset * 0.6, py);
            }
            // 右侧波浪（反向回来）
            for (let w = waveCount; w >= 0; w--) {
              const t = w / waveCount;
              const px = Math.sin(t * Math.PI) * petalWidth * (1 - t * 0.5);
              const py = -petalLength * 0.2 - t * petalLength * 0.8;
              const waveOffset = Math.sin(t * Math.PI * 2) * petalWidth * 0.25 * (1 - t);
              ctx.lineTo(px + waveOffset * 0.6, py);
            }
            ctx.closePath();

            // 渐变色填充
            const gradient = ctx.createLinearGradient(0, -petalLength * 0.2, 0, -petalLength);
            gradient.addColorStop(0, colorInner);
            gradient.addColorStop(0.6, colorOuter);
            gradient.addColorStop(1, '#f8bbd0');
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = 'rgba(180, 40, 70, 0.25)';
            ctx.lineWidth = 0.6;
            ctx.stroke();

            ctx.restore();
          }
        }

        // 花蕊（中心绒毛感）
        ctx.beginPath();
        ctx.arc(0, 0, baseRadius * 0.15 * scaleFactor, 0, Math.PI * 2);
        ctx.fillStyle = '#f9f3b0';
        ctx.fill();
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2;
          const rx = Math.cos(a) * baseRadius * 0.12;
          const ry = Math.sin(a) * baseRadius * 0.12;
          ctx.beginPath();
          ctx.arc(rx, ry, baseRadius * 0.04, 0, Math.PI * 2);
          ctx.fillStyle = '#fff9c4';
          ctx.fill();
        }

        ctx.restore();
      }

      // ---------- 绘制背景光晕 ----------
      function drawGlow() {
        ctx.save();
        ctx.translate(centerX, centerY);
        const glowSize = Math.min(width, height) * 0.5;
        const gradient = ctx.createRadialGradient(0, 0, glowSize * 0.3, 0, 0, glowSize);
        gradient.addColorStop(0, 'rgba(255, 235, 238, 0.5)');
        gradient.addColorStop(0.6, 'rgba(248, 187, 208, 0.2)');
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(-glowSize, -glowSize, glowSize * 2, glowSize * 2);
        ctx.restore();
      }

      // ---------- 动画循环 ----------
      function animate(timestamp) {
        if (!animationStart) animationStart = timestamp;
        const elapsed = timestamp - animationStart;

        ctx.clearRect(0, 0, width, height);

        // 背景光晕
        drawGlow();

        // 盛开进度 (0->1)
        let bloomProgress = Math.min(elapsed / bloomDuration, 1.0);
        // 使用缓出函数让绽放更自然
        bloomProgress = 1 - Math.pow(1 - bloomProgress, 3); // ease-out cubic

        // 绘制康乃馨
        drawCarnation(bloomProgress);

        // 更新并绘制飘落花瓣（花苞阶段少量飘落，盛开后增多）
        const activePetalCount = bloomProgress < 0.4 ? 5 : (bloomProgress < 0.8 ? 20 : maxPetals);
        updatePetals(elapsed);
        for (let i = 0; i < petals.length; i++) {
          if (i < activePetalCount) {
            const p = petals[i];
            if (elapsed >= p.delay) {
              drawFloatingPetal(ctx, p.x, p.y, p.size, p.rotation, p.opacity, p.color);
            }
          }
        }

        // 文字渐显 (在花朵基本盛开后)
        if (elapsed > totalDuration) {
          blessing.classList.add('show');
        }

        // 继续动画循环（飘落持续）
        requestAnimationFrame(animate);
      }

      // 启动！
      resize(); // 确保中心点正确
      requestAnimationFrame(animate);

      // 点击或触摸时增加飘落花瓣小惊喜
      window.addEventListener('click', (e) => {
        const x = e.clientX;
        const y = e.clientY;
        // 添加几个临时花瓣从点击位置飘出
        for (let i = 0; i < 3; i++) {
          petals.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 2.5,
            vy: Math.random() * -2 - 1,
            size: Math.random() * 30 + 15,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.08,
            opacity: 0.9,
            color: `rgba(255, ${100 + Math.floor(Math.random() * 80)}, ${130 + Math.floor(Math.random() * 70)}, `,
            delay: 0,
          });
        }
        // 防止花瓣数量无限增多，保留上限
        if (petals.length > maxPetals + 15) {
          petals.splice(0, petals.length - maxPetals - 10);
        }
      });
    })();
  </script>
</body>
</html>
